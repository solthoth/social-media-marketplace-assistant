name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  format:
    name: Format And File Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install npm dependencies
        run: npm ci

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run formatting and file checks
        run: |
          pre-commit run --all-files trailing-whitespace
          pre-commit run --all-files end-of-file-fixer
          pre-commit run --all-files check-json
          pre-commit run --all-files check-yaml
          pre-commit run --all-files prettier

  api:
    name: API Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.3
          cache-dependency-path: services/api/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Check Go formatting
        run: npm run api:fmt:check

      - name: Run Go vet
        run: npm run api:vet

      - name: Run API tests
        run: npm run api:test

      - name: Run API integration tests
        run: npm run api:integration:test

  web:
    name: Web Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build web app
        run: npm run web:build

      - name: Run web tests
        run: npm run web:test

  commitlint:
    name: Commit Message Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx --no -- commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

      - name: Lint pushed commit messages
        if: github.event_name == 'push'
        run: npx --no -- commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}"
