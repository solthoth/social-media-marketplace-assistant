name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.3
          cache-dependency-path: services/api/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install npm dependencies
        run: npm ci

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit checks
        run: pre-commit run --all-files --hook-stage pre-commit

      - name: Lint commit messages
        if: github.event_name == 'pull_request'
        run: npx --no -- commitlint --from "${{ github.event.pull_request.base.sha }}" --to "${{ github.event.pull_request.head.sha }}"

      - name: Lint pushed commit messages
        if: github.event_name == 'push'
        run: npx --no -- commitlint --from "${{ github.event.before }}" --to "${{ github.sha }}"
