services:
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PORT: '8080'
      DATABASE_PATH: /data/app.db
      PHOTO_STORAGE_PATH: /data/photos
    ports:
      - '8080:8080'
    volumes:
      - api-data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '4200:80'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost/']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  api-data:
